# OpenVPN nanoTECH — MikroTik ovpn-client (UDP 1194, user/pass)
port 1194
proto udp
dev tun
topology subnet
server 10.200.101.0 255.255.255.0
ifconfig-pool-persist /var/lib/nanotech-vpn/openvpn-ipp.txt
keepalive 10 120
persist-key
persist-tun
ca /etc/openvpn/nanotech/ca.crt
cert /etc/openvpn/nanotech/server.crt
key /etc/openvpn/nanotech/server.key
dh /etc/openvpn/nanotech/dh.pem
tls-version-min 1.2
cipher AES-256-CBC
auth SHA256
auth-user-pass-verify /opt/nanotech-vpn/scripts/openvpn-auth.sh via-env
username-as-common-name
script-security 3
verify-client-cert none
client-config-dir /etc/openvpn/ccd
ccd-exclusive
user nobody
group nogroup
status /var/log/openvpn/nanotech-status.log
log-append /var/log/openvpn/nanotech.log
verb 3
