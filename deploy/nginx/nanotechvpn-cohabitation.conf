# Cohabitation avec nanovoucher.com — nanoTECH VPN sur port 3002
# Ne modifie PAS le vhost nanovoucher existant

server {
    listen 80;
    server_name nanotechvpn.com www.nanotechvpn.com;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}

# HTTPS après certbot (ne pas toucher au certificat nanovoucher) :
# sudo certbot --nginx -d nanotechvpn.com -d www.nanotechvpn.com
