services:
  postgres:
    image: postgres:16-alpine
    container_name: nanotech-vpn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nanotech
      POSTGRES_PASSWORD: nanotech_dev
      POSTGRES_DB: mikrotik_vpn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanotech -d mikrotik_vpn"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
